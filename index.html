<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SplitBill SaaS</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>SplitBill SaaS</h1>
      <div class="actions">
        <button id="loginBtn">Login Google</button>
        <button id="logoutBtn" class="secondary">Logout</button>
      </div>
    </header>

    <section class="card">
      <h2>Status Akun</h2>
      <div id="status">Belum login</div>
      <div id="quota">Kuota: -</div>
      <div id="device">Device: -</div>
    </section>

    <section class="card">
      <h2>Setup</h2>
      <ol>
        <li>Isi environment variable Supabase di Vercel.</li>
        <li>Aktifkan Google provider di Supabase.</li>
        <li>Jalankan <code>supabase/schema.sql</code> di SQL Editor.</li>
      </ol>
    </section>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./app.js"></script>
</body>
</html>
